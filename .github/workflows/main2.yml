name: BookMyShow Seat Scraper (Continuous Polling)

on:
  workflow_dispatch:
  # You can uncomment the line below to schedule it automatically (e.g., every 5 hours)
  # schedule:
  #   - cron: '0 */5 * * *'

permissions:
  contents: write # Crucial for pushing state.json back to repo

jobs:
  poll-bms:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Ensures GitHub doesn't kill it before our 5h55m timer
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for proper git rebasing

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Set pull strategy to rebase to handle overlapping runner commits cleanly
          git config --global pull.rebase true

      - name: Run Polling Script
        run: python run_scraper.py
